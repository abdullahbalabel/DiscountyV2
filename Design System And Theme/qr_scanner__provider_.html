<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Discounty | QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#e8eeff",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#dae4ed",
              "secondary-fixed-dim": "#bec8d1",
              "on-background": "#161c28",
              "tertiary-fixed": "#7ef9ca",
              "inverse-on-surface": "#ecf0ff",
              "on-secondary": "#ffffff",
              "on-secondary-fixed": "#141d23",
              "on-tertiary-fixed-variant": "#00513b",
              "on-secondary-fixed-variant": "#3f4850",
              "surface-container-high": "#e2e8f9",
              "inverse-surface": "#2a303d",
              "background": "#f9f9ff",
              "surface-container-highest": "#dde2f3",
              "on-error-container": "#93000a",
              "tertiary": "#00694d",
              "error": "#ba1a1a",
              "on-surface": "#161c28",
              "surface-variant": "#dde2f3",
              "surface-container-low": "#f1f3ff",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed-variant": "#920020",
              "on-error": "#ffffff",
              "primary-container": "#dd2d42",
              "primary": "#b9082c",
              "on-primary-container": "#fffbff",
              "on-tertiary-container": "#f5fff8",
              "surface-dim": "#d4daeb",
              "outline-variant": "#e4bdbc",
              "secondary-container": "#dae4ed",
              "primary-fixed": "#ffdad9",
              "on-surface-variant": "#5b403f",
              "secondary": "#565f68",
              "primary-fixed-dim": "#ffb3b2",
              "surface": "#f9f9ff",
              "on-tertiary-fixed": "#002116",
              "tertiary-fixed-dim": "#60dcaf",
              "on-primary-fixed": "#410008",
              "surface-tint": "#bc0d2e",
              "on-primary": "#ffffff",
              "tertiary-container": "#008562",
              "surface-bright": "#f9f9ff",
              "outline": "#906f6f",
              "on-secondary-container": "#5c656e",
              "error-container": "#ffdad6",
              "inverse-primary": "#ffb3b2"
            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-overlay {
            background: rgba(20, 29, 35, 0.7);
            clip-path: polygon(0% 0%, 0% 100%, 15% 100%, 15% 25%, 85% 25%, 85% 75%, 15% 75%, 15% 100%, 100% 100%, 100% 0%);
        }
        .scanner-frame {
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.2);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #FF4757, transparent);
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 25%; }
            50% { top: 75%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/20">
<!-- Top Navigation Anchor (Shared Component Mapping) -->
<nav class="fixed top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-950/70 backdrop-blur-xl no-border bg-slate-100 dark:bg-slate-900">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white shadow-lg overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close up portrait of a professional male store manager smiling in a clean modern retail environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCknlS9zxOuKTV50ugNGFkCXtlhraHCGBYcs49dvglsWMDKl3Ng2ohQcMaQ80N8a462850cxjKhmbYi5LmiEGWzzro9gK8wH7vXRT_8jObiXaxfK5hZvIz3HplDhoagzpd53PnLPr782EBtBwDst-LZXXy3LmNOeOQPvNfT1XeH5A7DwVRmMAiK5f6SVuvcE6mHqE11_Ltnmn7VDJ1rf_Lnt1ewRZqjVjAdBx7ZLmLOC9Bre6sC9jjyABWSFfFNb8O-sE180iBymYIq"/>
</div>
<span class="text-2xl font-black text-[#141d23] dark:text-white tracking-tighter font-['Epilogue']">Discounty</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container transition-all active:scale-95">
<span class="material-symbols-outlined text-[#141d23]">notifications</span>
</button>
</div>
</div>
</nav>
<main class="min-h-screen flex flex-col pt-20 pb-24">
<!-- Camera Viewport Container -->
<div class="relative flex-grow flex items-center justify-center overflow-hidden bg-on-secondary-fixed">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 z-0">
<img alt="Store Background" class="w-full h-full object-cover opacity-60" data-alt="Blurred background of a modern minimalist clothing boutique with soft industrial lighting and organized racks" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCa1lA5fvtS_zsbKDJVNqT3vNarZmbTgK8c1EOrOnAFsfLenXzRvXjtD9aeS_IbyRu2X9NMwg6CgUexBRrvMKJz2m9RnBcsjP8go6uSD-Bl9lyOXmXQP99bVyzuJwhaGhbStu-DxALDFp_pppGee4KSF0j1g8Vu7ct4uP9wW-ZykggDPtz1FTA3unAVG_2gG4JME2Wsjrpk-59gDiLaVwabK5QA-2pFekqYl9HvcmksILBszCCVazy7KKEGKSjl6MI3_ioEOpT-IjQX"/>
</div>
<!-- Scanner Overlay -->
<div class="absolute inset-0 z-10 scanner-overlay backdrop-blur-[2px]"></div>
<!-- Focus Frame -->
<div class="relative z-20 w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-[#FF4757] rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-[#FF4757] rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-[#FF4757] rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-[#FF4757] rounded-br-xl"></div>
<!-- Animated Scan Line -->
<div class="absolute w-full h-1 bg-gradient-to-r from-transparent via-[#FF4757] to-transparent shadow-[0_0_15px_rgba(255,71,87,0.8)] animate-[scan_3s_ease-in-out_infinite]"></div>
<!-- QR Example Placeholder (Subtle) -->
<div class="opacity-10 grayscale scale-90">
<span class="material-symbols-outlined text-[120px] md:text-[200px]" data-weight="fill">qr_code_2</span>
</div>
</div>
<!-- UI Controls Floating on Camera -->
<div class="absolute bottom-12 left-0 w-full z-30 flex flex-col items-center px-8 text-center">
<p class="text-white font-body font-semibold mb-8 bg-black/30 backdrop-blur-md px-6 py-2 rounded-full border border-white/10">
                    Center the QR code within the frame
                </p>
<div class="flex gap-6">
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-90">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-90">
<span class="material-symbols-outlined">keyboard</span>
</button>
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-90">
<span class="material-symbols-outlined">history</span>
</button>
</div>
</div>
</div>
<!-- Manual Entry Section (Bottom Sheet Style) -->
<section class="bg-surface rounded-t-xl px-6 pt-10 pb-8 -mt-6 relative z-40 shadow-2xl">
<div class="max-w-xl mx-auto">
<div class="flex items-center justify-between mb-6">
<h2 class="text-2xl font-headline font-bold text-on-secondary-fixed tracking-tight">Manual Redemption</h2>
<span class="text-xs font-label uppercase tracking-widest text-secondary font-bold">Provider Mode</span>
</div>
<div class="space-y-4">
<div class="relative">
<input class="w-full px-6 py-5 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-secondary/50 focus:ring-2 focus:ring-primary transition-all font-body font-bold text-lg" placeholder="Enter Redemption Code" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">edit_square</span>
</div>
</div>
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold text-lg shadow-[0_10px_20px_rgba(185,8,44,0.2)] hover:shadow-[0_15px_30px_rgba(185,8,44,0.3)] transition-all active:scale-95 flex items-center justify-center gap-2">
<span>Verify &amp; Redeem</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Recent Activity/Context -->
<div class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-5 rounded-xl flex items-center gap-4 group cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 rounded-lg bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">verified</span>
</div>
<div>
<p class="text-xs font-label font-bold text-secondary uppercase">Last Scan</p>
<p class="text-sm font-bold text-on-surface">#9928 - Success</p>
</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl flex items-center gap-4 group cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">analytics</span>
</div>
<div>
<p class="text-xs font-label font-bold text-secondary uppercase">Daily Total</p>
<p class="text-sm font-bold text-on-surface">42 Redemptions</p>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Shared Component Mapping) -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-[#141d23]/80 backdrop-blur-lg no-border shadow-[0_-1px_20px_rgba(0,0,0,0.05)] rounded-t-[3rem] flex justify-around items-center px-4 pb-6 pt-2 h-24">
<!-- Dashboard Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined text-2xl mb-1">dashboard</span>
<span class="font-['Manrope'] font-semibold text-[10px] uppercase tracking-widest">Dashboard</span>
</a>
<!-- Scanner Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#FF4757] text-white rounded-full p-3 shadow-[0_10px_20px_rgba(255,71,87,0.3)] scale-110 duration-200" href="#">
<span class="material-symbols-outlined text-2xl mb-1" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Manrope'] font-semibold text-[8px] uppercase tracking-widest leading-none">Scan</span>
</a>
<!-- History Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined text-2xl mb-1">history</span>
<span class="font-['Manrope'] font-semibold text-[10px] uppercase tracking-widest">History</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined text-2xl mb-1">person</span>
<span class="font-['Manrope'] font-semibold text-[10px] uppercase tracking-widest">Profile</span>
</a>
</nav>
</body></html>
