<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#dae4ed",
              "secondary-fixed-dim": "#bec8d1",

              "surface-dim": "#d4daeb",
              "on-secondary-fixed": "#141d23",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(20, 29, 35, 0.4) 0%, transparent 20%, transparent 80%, rgba(20, 29, 35, 0.6) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-secondary-fixed font-body overflow-hidden h-screen">
<!-- TopAppBar Shell Implementation -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 max-w-7xl mx-auto z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md transition-opacity duration-200 hover:opacity-80">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="Close up portrait of a smiling young woman with natural lighting and soft blurred background for a user profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCODP-QPVanQdTjr-453ZMu6TDoz6BvdAd-W3NC31vpDmqGEEShD-b4fBOahIGpdaQS9s-QeRUh80C-HZvJULjzN4ex1g7RRdl5NU78z-nV_bDm6NWXEXmmBKzXJi33ZxJ4OfGXPpcUogR9jxVfbwY-jpcmODyVtgYiDeADveH89nU-3szaHUBwZ8MHGskhPX8NFKNUeCFGFB5v7VwwNuObCaBmPYRC_nWcz_n5KlHEM9gk8r1b6M5O6cFOrStBFRklpXvKEkpbu8oY"/>
</div>
<span class="font-headline font-bold tracking-tighter text-2xl text-[#1E272E] dark:text-white">Discounty</span>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full h-full pt-20">
<!-- Mock Map Background (Dark Theme) -->
<div class="absolute inset-0 bg-[#0f172a] overflow-hidden">
<img class="w-full h-full object-cover opacity-60 grayscale brightness-50" data-alt="Dark stylized urban map showing high-contrast streets and avenues with glowing blue and navy tones for a premium navigation feel" data-location="New York" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEdGbd22Q04Kq1SeAz2P1wM-gSjuJtrVNdtUOLVAIxzPbCZtjTWSziNCWwJjVDePRKMzqnzDsxu6oSA_tbRHoy6Wf1auk3xyE4Om-u0mb3A1Ei02WOE0x68fWYjsd8dwom-C2O1Wm5RxE_lfwJYED3BCLqBSNi7lxWaLUbDyjlulLezlBHklKd42eYhfrhaNzr7V1fAiXceU2Clc0lR7u2780e14IAzSoSW0soUx1AxccHcyM48xYR-9F5e2-0cRU_efyxS2W5DwYc"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
</div>
<!-- Floating Search Interface -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-30">
<div class="flex flex-col gap-4">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl rounded-full px-6 py-3 shadow-2xl flex items-center gap-3 group border border-white/10">
<span class="material-symbols-outlined text-primary" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/50 font-medium" placeholder="Search categories, brands..." type="text"/>
<span class="material-symbols-outlined text-on-surface-variant/40" data-icon="tune">tune</span>
</div>
<!-- Quick Categories Bento-lite chips -->
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar px-2">
<button class="flex-shrink-0 bg-primary text-white px-5 py-2 rounded-full font-semibold text-sm flex items-center gap-2 shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
                        Dining
                    </button>
<button class="flex-shrink-0 bg-on-secondary-fixed text-white px-5 py-2 rounded-full font-semibold text-sm flex items-center gap-2 backdrop-blur-md bg-opacity-80">
<span class="material-symbols-outlined text-sm" data-icon="shopping_bag">shopping_bag</span>
                        Retail
                    </button>
<button class="flex-shrink-0 bg-on-secondary-fixed text-white px-5 py-2 rounded-full font-semibold text-sm flex items-center gap-2 backdrop-blur-md bg-opacity-80">
<span class="material-symbols-outlined text-sm" data-icon="spa">spa</span>
                        Wellness
                    </button>
</div>
</div>
</div>
<!-- Pulsing Map Markers -->
<!-- Center Marker (Active) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
<div class="relative flex items-center justify-center">
<div class="absolute w-12 h-12 bg-primary/30 rounded-full animate-ping"></div>
<div class="w-8 h-8 bg-primary rounded-full border-4 border-white shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xs" data-icon="local_offer" style="font-variation-settings: 'FILL' 1;">local_offer</span>
</div>
</div>
</div>
<!-- Distant Marker 1 -->
<div class="absolute top-[40%] left-[30%] z-20">
<div class="w-6 h-6 bg-on-secondary-fixed rounded-full border-2 border-white/50 shadow-lg flex items-center justify-center">
<div class="w-2 h-2 bg-primary-container rounded-full"></div>
</div>
</div>
<!-- Distant Marker 2 -->
<div class="absolute top-[60%] right-[25%] z-20">
<div class="w-6 h-6 bg-on-secondary-fixed rounded-full border-2 border-white/50 shadow-lg flex items-center justify-center">
<div class="w-2 h-2 bg-primary-container rounded-full"></div>
</div>
</div>
<!-- Selected Deal Drawer -->
<div class="absolute bottom-24 left-0 w-full z-40 px-4 flex justify-center">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_-10px_40px_rgba(185,8,44,0.12)] overflow-hidden">
<!-- Handle -->
<div class="flex justify-center py-3">
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<div class="p-6 pt-0">
<div class="flex gap-4 items-start">
<div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Close up of a delicious gourmet burger with melting cheese and fresh vegetables in a moody restaurant setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbK5MENV38QFVTpzxci5hQWqPS67F0SL4VhcMWbVg0IndrOJGH43YjUTMfpOQiWSYOqAt1IV4fh5_JUCB88sZ-IR4hHXoM8sAOG94KH2culHEPxDmHoOat3O9yGKaK_v2wXHv6lGzP2POMV3R6njaON_bWxQDP3vo_Q5FGKVPn5BltT_FcJTx5BZ_jnYvaUtJCUsiZ_5gvtNwX8JkrY-ve4jkfKxZXM0MYr97IVb_059iLLp5KVYmFyDs8FCqD6aBO8wPO5LndCMiG"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="font-headline font-bold text-on-surface text-lg leading-tight">The Butcher's Grill</h3>
<span class="bg-tertiary/10 text-tertiary px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Active</span>
</div>
<p class="text-on-surface-variant font-medium text-sm mt-1">40% Off Total Bill</p>
<div class="flex items-center gap-1 mt-2 text-primary font-bold text-xs">
<span class="material-symbols-outlined text-xs" data-icon="distance">distance</span>
                                0.4 miles away
                            </div>
</div>
</div>
<div class="flex gap-3 mt-6">
<button class="flex-[2] bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-full font-bold text-sm shadow-[0_10px_20px_rgba(185,8,44,0.2)] hover:scale-95 duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="directions" style="font-variation-settings: 'FILL' 1;">directions</span>
                            Get Directions
                        </button>
<button class="flex-1 bg-on-secondary-fixed text-white py-4 rounded-full font-bold text-sm hover:scale-95 duration-200 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Shell Implementation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white dark:bg-[#1E272E] rounded-t-[3rem] shadow-[0_-10px_40px_rgba(185,8,44,0.08)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="local_offer">local_offer</span>
<span class="font-['Manrope'] font-semibold text-[11px] uppercase tracking-wider">Deals</span>
</a>
<!-- Active Tab: Dashboard (Mapping Map context to Dashboard/Explore intent) -->
<a class="flex flex-col items-center justify-center bg-[#FF4757]/10 text-[#FF4757] rounded-[24px] px-5 py-2 scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-['Manrope'] font-semibold text-[11px] uppercase tracking-wider">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span class="font-['Manrope'] font-semibold text-[11px] uppercase tracking-wider">Saved</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#FF4757] transition-colors scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Manrope'] font-semibold text-[11px] uppercase tracking-wider">Profile</span>
</a>
</nav>
</body></html>
