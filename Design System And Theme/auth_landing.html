<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .editorial-gradient {
      background: linear-gradient(135deg, #b9082c 0%, #dd2d42 100%);
    }
    .navy-anchor {
      background-color: #141d23;
    }
    .glass-effect {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.75);
    }
    .asymmetric-shape {
      border-radius: 160px 40px 180px 60px;
    }

<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Suppression of Shell: This is a Transactional/Linear screen -->
<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
<!-- Background Editorial Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-5%] w-[60%] h-[80%] editorial-gradient opacity-10 asymmetric-shape blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[70%] bg-surface-container-highest opacity-40 asymmetric-shape blur-3xl"></div>
<!-- Asymmetric Image Grid (Editorial Feel) -->
<div class="absolute inset-0 grid grid-cols-12 gap-8 p-12 opacity-20 pointer-events-none">
<div class="col-span-4 mt-20">
<img class="w-full h-[400px] object-cover rounded-xl grayscale" data-alt="high-fashion editorial shot of a shopping bag with vibrant textures and sharp shadows in a minimalist studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsRjICsq7KJa7xpc6-5tcKraxECG7THIPKj4EwA8uK8pkOja05IY-h0r_-N3QgteBJC7zFiIM5IvTzGUSHVWUa0PwPnePKj_fQp8NSHQUM2szQVkIOKGb05ne8iAagp4UFgZUphfRZH1RjM3uQmlEi2Oe3FIgfSr8NCESaoSvrVTArCuW_vBZxw69UTrXQYiB64oH0lFo7HwExzoEoxwNE2WcT5N3XbypearIhsLkIYzHSR46mb_TWYp01OU1ldknu6wGktagekuaU"/>
</div>
<div class="col-span-4 col-start-9 mt-40">
<img class="w-full h-[300px] object-cover rounded-xl grayscale" data-alt="blurred motion of people walking through a modern luxury shopping mall with sleek architectural lines and glass surfaces" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaDjF0XHjJFeLIxqVPnglDU3Gb15KR8puiIOwlW8pVIqXzC8KThIopw49V5yK3MOJxAJH1avkmGvcYenrxD6nnNA7mcJshUQdCm4wk6m1iotXiFg5aHIwIlRdxvkZFsf5sZ31adpRmXbYPF5oruPEC9X2P8PgEhnidszKPca1ZCdbONzJsee7R-RfsoYYH5eKOd1DtJXM61NBwc68Jd7T6SC-9pXwGA2Hmz_GmuzYt5UCsPYlCsaYLPDtTXQDZAx2144NXnabH6Lc_"/>
</div>
</div>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-xl px-6">
<div class="surface-container-lowest glass-effect rounded-xl p-10 md:p-14 shadow-[0_20px_60px_rgba(185,8,44,0.12)]">
<!-- Branding Identity from JSON Anchor -->
<div class="mb-12">
<span class="font-headline font-bold tracking-tighter text-4xl text-[#FF4757]">Discounty</span>
<p class="font-body text-secondary mt-4 text-lg max-w-[280px]">Curated deals for the discerning modern shopper.</p>
</div>
<!-- Auth Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label text-[11px] uppercase tracking-widest text-on-surface-variant font-semibold px-1">Email Address</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface font-body transition-all" placeholder="name@exclusive.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-[11px] uppercase tracking-widest text-on-surface-variant font-semibold">Password</label>
<a class="font-label text-[10px] uppercase tracking-wider text-primary font-bold hover:opacity-70 transition-opacity" href="#">Forgot?</a>
</div>
<input class="w-full px-6 py-4 rounded-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface font-body transition-all" placeholder="••••••••••••" type="password"/>
</div>
<div class="pt-6 space-y-4">
<!-- Primary Action with Scale Interaction -->
<button class="w-full editorial-gradient text-on-primary font-body font-bold py-5 rounded-full shadow-[0_15px_30px_rgba(185,8,44,0.25)] hover:scale-[0.98] active:scale-95 transition-all duration-200 text-lg" type="submit">
              Sign In
            </button>
<!-- Secondary High-Contrast Action -->
<button class="w-full navy-anchor text-white font-body font-semibold py-5 rounded-full hover:bg-[#2a3642] active:scale-95 transition-all duration-200 flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="key">key</span>
<span>Access with Passkey</span>
</button>
</div>
</form>
<!-- Social Entry / Footer Logic -->
<div class="mt-12 pt-10 border-t border-outline-variant/10">
<div class="flex flex-col items-center gap-6">
<p class="font-label text-[11px] uppercase tracking-widest text-secondary font-semibold">Or continue with</p>
<div class="flex gap-4">
<button class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors">
<img class="w-6 h-6" data-alt="Google logo icon for social authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABFEigiYwNee36q_45Dm-UswFSRL7FlvkZWeV0dd2rs596CdGGEHr2Y9DOcI8OgMoCBMHrfyOvRMAmC_krWzEH7bSC42D5w20WyJpelCzSeaTtRq86MB72-w0S7N_w18grv7s-eibfu-7HRZKw5Uk8jr_C-NHg1zwtesQth6XrsL2yvpkcUSLBiqDMTnNM9t7FMT6lHYDJKWy86rtupOFmxEmXNUU1_1dd2nPuX29pKXSVXCISnKQS9RheizrCrDuB-vo-_bvivAak"/>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="apple">ios</span>
</button>
</div>
</div>
</div>
</div>
<!-- Asymmetric Bottom Meta Info -->
<div class="mt-8 flex justify-between items-center px-4">
<p class="font-label text-[11px] text-secondary">New here? <a class="text-primary font-bold" href="#">Create Account</a></p>
<div class="flex gap-4">
<span class="font-label text-[11px] text-outline">Privacy</span>
<span class="font-label text-[11px] text-outline">Terms</span>
</div>
</div>
</div>
<!-- Decorative Floating Editorial Element -->
<div class="absolute right-[-5%] top-[20%] hidden xl:block pointer-events-none">
<div class="surface-container-lowest p-8 rounded-xl shadow-2xl max-w-xs rotate-3 border border-outline-variant/5">
<div class="flex items-center gap-4 mb-4">
<div class="w-10 h-10 rounded-full editorial-gradient flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="trending_up">trending_up</span>
</div>
<div>
<p class="font-label text-[10px] uppercase tracking-widest text-secondary font-bold">Peak Savings</p>
<p class="font-headline font-bold text-lg text-on-surface">-85% OFF LUXURY</p>
</div>
</div>
<div class="h-[2px] w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full w-[70%] editorial-gradient"></div>
</div>
</div>
</div>
</main>
